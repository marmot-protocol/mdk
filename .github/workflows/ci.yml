name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Change Detection ────────────────────────────────────────────────
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - 'rustfmt.toml'
              - 'justfile'
              - 'scripts/**'
            ci:
              - '.github/workflows/**'
              - 'scripts/check-github-actions-pinned.sh'
              - 'scripts/check-workflow-policy.sh'

  # ── Workflow policy ─────────────────────────────────────────────────
  workflow-policy:
    runs-on: ubuntu-latest
    name: Workflow Policy
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.ci == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Check GitHub workflow policy
      run: bash scripts/check-workflow-policy.sh

  # ── Quick checks that fail fast ─────────────────────────────────────
  format:
    runs-on: ubuntu-latest
    name: Format
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Rust (stable)
      uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # pinned from master
      with:
        toolchain: stable
        components: rustfmt

    - name: Check formatting
      run: cargo fmt --all -- --check

  # ── Clippy ──────────────────────────────────────────────────────────
  # Both stable and MSRV on all events (matches `just precommit` contract)
  lint:
    needs: [format, changes]
    strategy:
      fail-fast: false
      matrix:
        rust: ["1.90.0", "stable"]
        features:
          - name: "all-features"
            flags: "--all-features"
          - name: "no-features"
            flags: "--no-default-features"
          - name: "mip04-only"
            flags: "--no-default-features --features mip04"

    runs-on: ubuntu-latest
    name: Lint (${{ matrix.rust }}, ${{ matrix.features.name }})
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Rust (${{ matrix.rust }})
      uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # pinned from master
      with:
        toolchain: ${{ matrix.rust }}
        components: clippy

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        key: ${{ matrix.rust }}-${{ matrix.features.name }}

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y pkg-config

    - name: Run clippy
      run: cargo +${{ matrix.rust }} clippy --all-targets ${{ matrix.features.flags }} --no-deps -- -D warnings

  # ── Documentation ───────────────────────────────────────────────────
  # Both stable and MSRV on all events (matches `just precommit` contract)
  docs:
    needs: [format, changes]
    strategy:
      fail-fast: false
      matrix:
        rust: ["1.90.0", "stable"]

    runs-on: ubuntu-latest
    name: Documentation (${{ matrix.rust }})
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Rust (${{ matrix.rust }})
      uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # pinned from master
      with:
        toolchain: ${{ matrix.rust }}

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        key: ${{ matrix.rust }}-docs

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y pkg-config

    - name: Check documentation
      run: cargo +${{ matrix.rust }} doc --all-features --no-deps --document-private-items
      env:
        RUSTDOCFLAGS: "-D warnings"

  # ── Fast test lane ──────────────────────────────────────────────────
  # Runs all 3 feature combos with cargo-nextest for parallel execution
  test:
    needs: [format, changes]
    strategy:
      fail-fast: false
      matrix:
        features:
          - name: "all-features"
            flags: "--all-features"
          - name: "no-features"
            flags: "--no-default-features"
          - name: "mip04-only"
            flags: "--no-default-features --features mip04"

    runs-on: ubuntu-latest
    name: Test (${{ matrix.features.name }})
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Rust (stable)
      uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # pinned from master
      with:
        toolchain: stable

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        key: test-${{ matrix.features.name }}

    - name: Install cargo-nextest
      uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
      with:
        tool: cargo-nextest

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y pkg-config

    - name: Run tests
      run: cargo nextest run --all-targets ${{ matrix.features.flags }}

    - name: Doc tests
      if: matrix.features.name == 'all-features'
      run: cargo test --all-features --doc

  # ── Security Audit ──────────────────────────────────────────────────
  audit:
    needs: [changes]
    runs-on: ubuntu-latest
    name: Security Audit
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install cargo-audit
      uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
      with:
        tool: cargo-audit

    - name: Run cargo audit
      run: cargo audit --ignore RUSTSEC-2026-0124
