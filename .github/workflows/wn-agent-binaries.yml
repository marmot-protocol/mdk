name: wn-agent Binaries

on:
  pull_request:
    paths:
      - .github/workflows/wn-agent-binaries.yml
      - scripts/install-hermes-marmot.sh
      - integrations/hermes/marmot/**
      - scripts/install-openclaw-marmot.sh
      - integrations/openclaw/marmot/**
      - scripts/install-opencode-marmot.sh
      - integrations/opencode/marmot/**
      - Cargo.toml
      - Cargo.lock
      - rust-toolchain.toml
      - crates/agent-connector/**
      - crates/agent-control/**
      - crates/agent-stream-compose/**
      - crates/cgka-engine/**
      - crates/cgka-session/**
      - crates/marmot-account/**
      - crates/marmot-app/**
      - crates/storage-sqlite/**
      - crates/traits/**
      - crates/transport-nostr-adapter/**
      - crates/transport-nostr-peeler/**
      - crates/transport-quic-broker/**
      - crates/transport-quic-stream/**
  push:
    branches:
      - master
    tags:
      - wn-agent-v*
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wn-agent-binaries-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_RELEASE_DEBUG: "0"

jobs:
  build:
    name: Build wn-agent and wn-opencode (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: linux-x86_64
            rust_target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: linux-aarch64
            rust_target: aarch64-unknown-linux-gnu
          - runner: macos-latest
            target: darwin-aarch64
            rust_target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: darwin-x86_64
            rust_target: x86_64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          toolchain="$(sed -n 's/^channel = "\(.*\)"/\1/p' rust-toolchain.toml)"
          rustup toolchain install "$toolchain" --profile minimal --target "${{ matrix.rust_target }}"
          rustup default "$toolchain"
          rustc --version
          cargo --version

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build wn-agent
        run: cargo build --locked --release -p agent-connector --bin wn-agent --target "${{ matrix.rust_target }}"

      - name: Smoke test wn-agent
        run: ./target/${{ matrix.rust_target }}/release/wn-agent --help

      - name: Build wn-opencode
        run: cargo build --locked --release -p wn-opencode --bin wn-opencode --target "${{ matrix.rust_target }}"

      - name: Smoke test wn-opencode
        run: ./target/${{ matrix.rust_target }}/release/wn-opencode --help

      - name: Package wn-agent bundle
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          rust_target="${{ matrix.rust_target }}"
          sha_short="${GITHUB_SHA::12}"
          workspace_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          release_tag=""
          artifact_version="$sha_short"
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            release_tag="$GITHUB_REF_NAME"
            if [[ ! "$release_tag" =~ ^wn-agent-v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
              echo "error: wn-agent releases must use a version tag like wn-agent-v0.1.0" >&2
              exit 1
            fi
            artifact_version="${release_tag#wn-agent-v}"
            if [ "$artifact_version" != "$workspace_version" ]; then
              echo "error: wn-agent release version $artifact_version does not match workspace version $workspace_version" >&2
              exit 1
            fi
          fi
          lock_sha="$(shasum -a 256 Cargo.lock | awk '{print $1}')"
          stage_parent="$RUNNER_TEMP/wn-agent-stage"
          bundle_dir="$stage_parent/wn-agent-$target"
          asset="$RUNNER_TEMP/wn-agent-$target-$artifact_version.tar.gz"

          rm -rf "$stage_parent" "$asset" "$asset.sha256"
          mkdir -p "$bundle_dir"
          install -m 0755 "target/$rust_target/release/wn-agent" "$bundle_dir/wn-agent"

          cat > "$bundle_dir/manifest.json" <<EOF
          {
            "name": "wn-agent",
            "target": "$target",
            "rust_target": "$rust_target",
            "release_tag": "$release_tag",
            "artifact_version": "$artifact_version",
            "source_sha": "$GITHUB_SHA",
            "workspace_version": "$workspace_version",
            "cargo_lock_sha256": "$lock_sha",
            "rustc": "$(rustc --version)",
            "cargo": "$(cargo --version)",
            "contents": [
              "wn-agent",
              "manifest.json"
            ]
          }
          EOF

          (
            cd "$stage_parent"
            tar -czf "$asset" "wn-agent-$target"
          )
          shasum -a 256 "$asset" | awk -v name="$(basename "$asset")" '{print $1 "  " name}' > "$asset.sha256"
          mkdir -p "dist/wn-agent-$target"
          cp "$asset" "$asset.sha256" "dist/wn-agent-$target/"

      - name: Upload wn-agent bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wn-agent-${{ matrix.target }}
          path: dist/wn-agent-${{ matrix.target }}/*
          if-no-files-found: error

      - name: Package wn-opencode bundle
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          rust_target="${{ matrix.rust_target }}"
          sha_short="${GITHUB_SHA::12}"
          workspace_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          release_tag=""
          artifact_version="$sha_short"
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            release_tag="$GITHUB_REF_NAME"
            if [[ ! "$release_tag" =~ ^wn-agent-v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
              echo "error: wn-agent releases must use a version tag like wn-agent-v0.1.0" >&2
              exit 1
            fi
            artifact_version="${release_tag#wn-agent-v}"
            if [ "$artifact_version" != "$workspace_version" ]; then
              echo "error: wn-agent release version $artifact_version does not match workspace version $workspace_version" >&2
              exit 1
            fi
          fi
          lock_sha="$(shasum -a 256 Cargo.lock | awk '{print $1}')"
          stage_parent="$RUNNER_TEMP/wn-opencode-stage"
          bundle_dir="$stage_parent/wn-opencode-$target"
          asset="$RUNNER_TEMP/wn-opencode-$target-$artifact_version.tar.gz"

          rm -rf "$stage_parent" "$asset" "$asset.sha256"
          mkdir -p "$bundle_dir"
          install -m 0755 "target/$rust_target/release/wn-opencode" "$bundle_dir/wn-opencode"

          cat > "$bundle_dir/manifest.json" <<EOF
          {
            "name": "wn-opencode",
            "target": "$target",
            "rust_target": "$rust_target",
            "release_tag": "$release_tag",
            "artifact_version": "$artifact_version",
            "source_sha": "$GITHUB_SHA",
            "workspace_version": "$workspace_version",
            "cargo_lock_sha256": "$lock_sha",
            "rustc": "$(rustc --version)",
            "cargo": "$(cargo --version)",
            "contents": [
              "wn-opencode",
              "manifest.json"
            ]
          }
          EOF

          (
            cd "$stage_parent"
            tar -czf "$asset" "wn-opencode-$target"
          )
          shasum -a 256 "$asset" | awk -v name="$(basename "$asset")" '{print $1 "  " name}' > "$asset.sha256"
          mkdir -p "dist/wn-opencode-$target"
          cp "$asset" "$asset.sha256" "dist/wn-opencode-$target/"

      - name: Upload wn-opencode bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wn-opencode-${{ matrix.target }}
          path: dist/wn-opencode-${{ matrix.target }}/*
          if-no-files-found: error

  plugin:
    name: Package Hermes plugin
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Package Hermes Marmot plugin bundle
        shell: bash
        run: |
          set -euo pipefail
          sha_short="${GITHUB_SHA::12}"
          workspace_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          release_tag=""
          artifact_version="$sha_short"
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            release_tag="$GITHUB_REF_NAME"
            if [[ ! "$release_tag" =~ ^wn-agent-v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
              echo "error: wn-agent releases must use a version tag like wn-agent-v0.1.0" >&2
              exit 1
            fi
            artifact_version="${release_tag#wn-agent-v}"
            if [ "$artifact_version" != "$workspace_version" ]; then
              echo "error: wn-agent release version $artifact_version does not match workspace version $workspace_version" >&2
              exit 1
            fi
          fi
          stage_parent="$RUNNER_TEMP/hermes-marmot-plugin-stage"
          bundle_dir="$stage_parent/hermes-marmot-plugin"
          asset="$RUNNER_TEMP/hermes-marmot-plugin-$artifact_version.tar.gz"

          rm -rf "$stage_parent" "$asset" "$asset.sha256"
          mkdir -p "$bundle_dir"
          sed -e "s/^version:.*/version: $artifact_version/" \
            integrations/hermes/marmot/plugin.yaml > "$bundle_dir/plugin.yaml"
          if ! grep -qx "version: $artifact_version" "$bundle_dir/plugin.yaml"; then
            echo "error: packaged Hermes plugin metadata did not get version $artifact_version" >&2
            exit 1
          fi
          cp integrations/hermes/marmot/__init__.py "$bundle_dir/"
          cp integrations/hermes/marmot/adapter.py "$bundle_dir/"
          cp integrations/hermes/marmot/README.md "$bundle_dir/"
          cp scripts/hermes_marmot_configure_gateway.py "$bundle_dir/configure_gateway.py"

          cat > "$bundle_dir/manifest.json" <<EOF
          {
            "name": "hermes-marmot-plugin",
            "release_tag": "$release_tag",
            "artifact_version": "$artifact_version",
            "source_sha": "$GITHUB_SHA",
            "workspace_version": "$workspace_version",
            "contents": [
              "plugin.yaml",
              "__init__.py",
              "adapter.py",
              "configure_gateway.py",
              "README.md",
              "manifest.json"
            ]
          }
          EOF

          (
            cd "$stage_parent"
            tar -czf "$asset" "hermes-marmot-plugin"
          )
          shasum -a 256 "$asset" | awk -v name="$(basename "$asset")" '{print $1 "  " name}' > "$asset.sha256"
          mkdir -p dist/hermes-marmot-plugin
          cp "$asset" "$asset.sha256" dist/hermes-marmot-plugin/

      - name: Upload Hermes plugin bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: hermes-marmot-plugin
          path: dist/hermes-marmot-plugin/*
          if-no-files-found: error

  openclaw-plugin:
    name: Package OpenClaw plugin
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Package OpenClaw Marmot plugin tarball
        shell: bash
        run: |
          set -euo pipefail
          sha_short="${GITHUB_SHA::12}"
          workspace_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          artifact_version="$sha_short"
          release_tag=""
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            release_tag="$GITHUB_REF_NAME"
            if [[ ! "$release_tag" =~ ^wn-agent-v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
              echo "error: wn-agent releases must use a version tag like wn-agent-v0.1.0" >&2
              exit 1
            fi
            artifact_version="${release_tag#wn-agent-v}"
            if [ "$artifact_version" != "$workspace_version" ]; then
              echo "error: release version $artifact_version does not match workspace version $workspace_version" >&2
              exit 1
            fi
          fi
          corepack enable
          corepack prepare pnpm@10.13.1 --activate
          packed_dir="$RUNNER_TEMP/openclaw-pack"
          rm -rf "$packed_dir"; mkdir -p "$packed_dir"
          # Build dist/ before packing: package.json#files ships dist (which is
          # gitignored), and the gateway requires compiled runtime output rather
          # than the TypeScript sources.
          ( cd integrations/openclaw/marmot && pnpm install --frozen-lockfile && pnpm build )
          # Provenance manifest (release.md requires one in each artifact); ships
          # via package.json#files alongside the built plugin.
          cat > integrations/openclaw/marmot/manifest.json <<EOF
          {
            "name": "openclaw-marmot-plugin",
            "release_tag": "$release_tag",
            "artifact_version": "$artifact_version",
            "source_sha": "$GITHUB_SHA",
            "workspace_version": "$workspace_version"
          }
          EOF
          # On a release tag, sync the tarball's package version to the cohort
          # (wn-agent / workspace version). Off-tag validation runs keep 0.1.0.
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            ( cd integrations/openclaw/marmot && npm pkg set version="$artifact_version" )
          fi
          ( cd integrations/openclaw/marmot && pnpm pack --pack-destination "$packed_dir" )
          packed="$(find "$packed_dir" -maxdepth 1 -type f -name '*.tgz' -print -quit)"
          if [ -z "$packed" ]; then
            echo "error: pnpm pack did not produce a tarball" >&2
            exit 1
          fi
          asset="$RUNNER_TEMP/openclaw-marmot-plugin-$artifact_version.tgz"
          mv "$packed" "$asset"
          shasum -a 256 "$asset" | awk -v name="$(basename "$asset")" '{print $1 "  " name}' > "$asset.sha256"
          mkdir -p dist/openclaw-marmot-plugin
          cp "$asset" "$asset.sha256" dist/openclaw-marmot-plugin/

      - name: Upload OpenClaw plugin tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: openclaw-marmot-plugin
          path: dist/openclaw-marmot-plugin/*
          if-no-files-found: error

  publish:
    name: Publish wn-agent release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/wn-agent-v')
    runs-on: ubuntu-latest
    needs:
      - build
      - plugin
      - openclaw-plugin
    timeout-minutes: 15
    permissions:
      actions: read
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Download build artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p dist/linux dist/linux-arm dist/darwin dist/darwin-intel dist/opencode-linux dist/opencode-linux-arm dist/opencode-darwin dist/opencode-darwin-intel dist/plugin
          gh run download "$GITHUB_RUN_ID" --repo "$GITHUB_REPOSITORY" --name wn-agent-linux-x86_64 --dir dist/linux
          gh run download "$GITHUB_RUN_ID" --repo "$GITHUB_REPOSITORY" --name wn-agent-linux-aarch64 --dir dist/linux-arm
          gh run download "$GITHUB_RUN_ID" --repo "$GITHUB_REPOSITORY" --name wn-agent-darwin-aarch64 --dir dist/darwin
          gh run download "$GITHUB_RUN_ID" --repo "$GITHUB_REPOSITORY" --name wn-agent-darwin-x86_64 --dir dist/darwin-intel
          gh run download "$GITHUB_RUN_ID" --repo "$GITHUB_REPOSITORY" --name wn-opencode-linux-x86_64 --dir dist/opencode-linux
          gh run download "$GITHUB_RUN_ID" --repo "$GITHUB_REPOSITORY" --name wn-opencode-linux-aarch64 --dir dist/opencode-linux-arm
          gh run download "$GITHUB_RUN_ID" --repo "$GITHUB_REPOSITORY" --name wn-opencode-darwin-aarch64 --dir dist/opencode-darwin
          gh run download "$GITHUB_RUN_ID" --repo "$GITHUB_REPOSITORY" --name wn-opencode-darwin-x86_64 --dir dist/opencode-darwin-intel
          gh run download "$GITHUB_RUN_ID" --repo "$GITHUB_REPOSITORY" --name hermes-marmot-plugin --dir dist/plugin
          gh run download "$GITHUB_RUN_ID" --repo "$GITHUB_REPOSITORY" --name openclaw-marmot-plugin --dir dist/plugin

      - name: Prepare versioned installer
        shell: bash
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          version="${tag#wn-agent-v}"
          workspace_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          if [[ ! "$tag" =~ ^wn-agent-v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "error: wn-agent releases must use a version tag like wn-agent-v0.1.0" >&2
            exit 1
          fi
          if [ "$version" != "$workspace_version" ]; then
            echo "error: wn-agent release version $version does not match workspace version $workspace_version" >&2
            exit 1
          fi

          mkdir -p dist/install
          sed \
            -e "s/^MARMOT_RELEASE_TAG_DEFAULT=.*/MARMOT_RELEASE_TAG_DEFAULT=\"${tag}\"/" \
            -e "s/^WN_AGENT_VERSION_DEFAULT=.*/WN_AGENT_VERSION_DEFAULT=\"${version}\"/" \
            scripts/install-hermes-marmot.sh > dist/install/install-hermes-marmot.sh
          chmod 0755 dist/install/install-hermes-marmot.sh
          sed \
            -e "s/^MARMOT_RELEASE_TAG_DEFAULT=.*/MARMOT_RELEASE_TAG_DEFAULT=\"${tag}\"/" \
            -e "s/^WN_AGENT_VERSION_DEFAULT=.*/WN_AGENT_VERSION_DEFAULT=\"${version}\"/" \
            scripts/install-openclaw-marmot.sh > dist/install/install-openclaw-marmot.sh
          chmod 0755 dist/install/install-openclaw-marmot.sh
          sed \
            -e "s/^MARMOT_RELEASE_TAG_DEFAULT=.*/MARMOT_RELEASE_TAG_DEFAULT=\"${tag}\"/" \
            -e "s/^WN_AGENT_VERSION_DEFAULT=.*/WN_AGENT_VERSION_DEFAULT=\"${version}\"/" \
            scripts/install-opencode-marmot.sh > dist/install/install-opencode-marmot.sh
          chmod 0755 dist/install/install-opencode-marmot.sh

      - name: Create or update wn-agent release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          version="${tag#wn-agent-v}"
          notes="$RUNNER_TEMP/release-notes.md"
          cat > "$notes" <<EOF
          WN Agent \`$version\` from MDK commit \`$GITHUB_SHA\`.

          Install the latest WN Agent release with:

          \`\`\`sh
          curl -fsSL https://github.com/$GITHUB_REPOSITORY/releases/download/wn-agent-latest/install-hermes-marmot.sh | bash
          curl -fsSL https://github.com/$GITHUB_REPOSITORY/releases/download/wn-agent-latest/install-openclaw-marmot.sh | bash
          curl -fsSL https://github.com/$GITHUB_REPOSITORY/releases/download/wn-agent-latest/install-opencode-marmot.sh | bash
          \`\`\`

          Install this exact WN Agent release with:

          \`\`\`sh
          curl -fsSL https://github.com/$GITHUB_REPOSITORY/releases/download/$tag/install-hermes-marmot.sh | bash
          curl -fsSL https://github.com/$GITHUB_REPOSITORY/releases/download/$tag/install-openclaw-marmot.sh | bash
          curl -fsSL https://github.com/$GITHUB_REPOSITORY/releases/download/$tag/install-opencode-marmot.sh | bash
          \`\`\`

          Assets:
          - \`wn-agent-<platform>-$version.tar.gz\`: versioned binary bundle.
          - \`wn-opencode-<platform>-$version.tar.gz\`: OpenCode harness binary bundle.
          - \`hermes-marmot-plugin-$version.tar.gz\`: Hermes platform plugin directory bundle.
          - \`openclaw-marmot-plugin-$version.tgz\`: OpenClaw channel plugin npm tarball.
          - \`install-hermes-marmot.sh\`: installer for testers with Hermes already installed.
          - \`install-openclaw-marmot.sh\`: installer for testers with OpenClaw already installed.
          - \`install-opencode-marmot.sh\`: installer for testers with OpenCode already installed.

          Verify downloads with the accompanying \`.sha256\` files.
          EOF

          assets=(
            dist/linux/wn-agent-linux-x86_64-"$version".tar.gz
            dist/linux/wn-agent-linux-x86_64-"$version".tar.gz.sha256
            dist/linux-arm/wn-agent-linux-aarch64-"$version".tar.gz
            dist/linux-arm/wn-agent-linux-aarch64-"$version".tar.gz.sha256
            dist/darwin/wn-agent-darwin-aarch64-"$version".tar.gz
            dist/darwin/wn-agent-darwin-aarch64-"$version".tar.gz.sha256
            dist/darwin-intel/wn-agent-darwin-x86_64-"$version".tar.gz
            dist/darwin-intel/wn-agent-darwin-x86_64-"$version".tar.gz.sha256
            dist/opencode-linux/wn-opencode-linux-x86_64-"$version".tar.gz
            dist/opencode-linux/wn-opencode-linux-x86_64-"$version".tar.gz.sha256
            dist/opencode-linux-arm/wn-opencode-linux-aarch64-"$version".tar.gz
            dist/opencode-linux-arm/wn-opencode-linux-aarch64-"$version".tar.gz.sha256
            dist/opencode-darwin/wn-opencode-darwin-aarch64-"$version".tar.gz
            dist/opencode-darwin/wn-opencode-darwin-aarch64-"$version".tar.gz.sha256
            dist/opencode-darwin-intel/wn-opencode-darwin-x86_64-"$version".tar.gz
            dist/opencode-darwin-intel/wn-opencode-darwin-x86_64-"$version".tar.gz.sha256
            dist/plugin/hermes-marmot-plugin-"$version".tar.gz
            dist/plugin/hermes-marmot-plugin-"$version".tar.gz.sha256
            dist/plugin/openclaw-marmot-plugin-"$version".tgz
            dist/plugin/openclaw-marmot-plugin-"$version".tgz.sha256
            dist/install/install-hermes-marmot.sh
            dist/install/install-openclaw-marmot.sh
            dist/install/install-opencode-marmot.sh
          )

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --title "v$version - wn-agent" --notes-file "$notes" --prerelease
          else
            gh release create "$tag" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "v$version - wn-agent" \
              --notes-file "$notes" \
              --prerelease
          fi

      - name: Create or update latest installer release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          version="${tag#wn-agent-v}"
          latest_tag="wn-agent-latest"
          latest_notes="$RUNNER_TEMP/latest-installer-release-notes.md"

          if [ "$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft')" = "true" ]; then
            echo "versioned release $tag is still draft; leaving $latest_tag unchanged"
            exit 0
          fi

          cat > "$latest_notes" <<EOF
          Latest WN Agent installers. These scripts install WN Agent \`$version\` from immutable release \`$tag\`.

          \`\`\`sh
          curl -fsSL https://github.com/$GITHUB_REPOSITORY/releases/download/$latest_tag/install-hermes-marmot.sh | bash
          curl -fsSL https://github.com/$GITHUB_REPOSITORY/releases/download/$latest_tag/install-openclaw-marmot.sh | bash
          curl -fsSL https://github.com/$GITHUB_REPOSITORY/releases/download/$latest_tag/install-opencode-marmot.sh | bash
          \`\`\`

          Use the versioned \`$tag\` release URLs when you need a pinned install.
          EOF

          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$latest_tag" >/dev/null 2>&1; then
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/git/refs/tags/$latest_tag" \
              -f sha="$GITHUB_SHA" \
              -F force=true >/dev/null
          else
            gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
              -f ref="refs/tags/$latest_tag" \
              -f sha="$GITHUB_SHA" >/dev/null
          fi

          assets=(
            dist/install/install-hermes-marmot.sh
            dist/install/install-openclaw-marmot.sh
            dist/install/install-opencode-marmot.sh
          )

          if gh release view "$latest_tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$latest_tag" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$latest_tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Latest WN Agent installers" \
              --notes-file "$latest_notes" \
              --prerelease \
              --latest=false
          else
            gh release create "$latest_tag" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Latest WN Agent installers" \
              --notes-file "$latest_notes" \
              --prerelease \
              --latest=false
          fi
