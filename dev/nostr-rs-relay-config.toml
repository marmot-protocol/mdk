# Nostr-rs-relay configuration for local Darkmatter integration tests.

[info]
relay_url = "ws://localhost:28080"
name = "darkmatter-dev"
description = "Darkmatter dev nostr relay"

[database]
engine = "sqlite"
data_directory = "/usr/src/app/db"

[logging]

[network]
address = "0.0.0.0"
port = 8080

[options]
reject_future_seconds = 1800

[limits]
limit_scrapers = false

[authorization]

[verified_users]
