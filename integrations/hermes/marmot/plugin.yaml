name: marmot
label: Marmot
kind: platform
version: 0.2.0
description: Hermes platform adapter for Marmot through the local dm-agent control socket
author: Darkmatter
requires_env: []
optional_env:
  - name: MARMOT_HOME
    description: "dm-agent home directory; required unless MARMOT_AGENT_SOCKET is set"
    password: false
  - name: MARMOT_AGENT_SOCKET
    description: "Unix socket for dm-agent; defaults to $MARMOT_HOME/dev/dm-agent.sock"
    password: false
  - name: MARMOT_AGENT_AUTH_TOKEN
    description: "Bearer token for a token-gated dm-agent control socket"
    password: true
  - name: MARMOT_AGENT_AUTH_TOKEN_FILE
    description: "Path to a bearer token file for a token-gated dm-agent control socket"
    password: false
  - name: MARMOT_ACCOUNT_ID_HEX
    description: "Agent account pubkey/account id hex; required when dm-agent has more than one account"
    password: false
  - name: MARMOT_GROUP_ID_HEX
    description: "Optional Marmot group id filter for inbound messages"
    password: false
  - name: MARMOT_QUIC_CANDIDATES
    description: "Comma-separated quic:// preview broker candidates for live Marmot previews"
    password: false
  - name: MARMOT_HOME_CHANNEL
    description: "Default Marmot group id for Hermes cron/home delivery"
    password: false
  - name: MARMOT_DEBOUNCE_MS
    description: "Optional inbound debounce window in ms; coalesces rapid same-sender/group messages into one turn (0 or absent = disabled)"
    password: false
  - name: MARMOT_GROUP_ACTIVATION
    description: "Multi-party group reply policy: mention (default) or always"
    password: false
  - name: MARMOT_MENTION_PATTERNS
    description: "Comma-separated trigger phrases; the configured agent name is always included when set"
    password: false
  - name: MARMOT_AGENT_NAME
    description: "Agent display name used as an extra mention trigger in multi-party groups and as the default Nostr profile name during onboarding"
    password: false
  - name: MARMOT_WELCOMER_ALLOWLIST
    description: "Comma-separated hex account ids mirrored into dm-agent's welcomer allowlist on connect (also MARMOT_DM_ALLOW_FROM)"
    password: false
  - name: MARMOT_MEDIA_LOCAL_ROOTS
    description: "Comma-separated local directories allowed for outbound media sends; defaults to $MARMOT_HOME/dev/inbound-media"
    password: false
  - name: MARMOT_INBOUND_MEDIA_DIR
    description: "Directory where inbound media is re-staged before agent tools read it; defaults to $MARMOT_HOME/dev/inbound-media"
    password: false
  - name: MARMOT_PROFILE_NAME_ONBOARDING
    description: "Enable the one-time public Nostr profile-name consent flow (true/false)"
    password: false
  - name: MARMOT_PROFILE_ONBOARDING_STATE
    description: "Path to the profile onboarding state file; defaults to $MARMOT_HOME/dev/profile-onboarding.json"
    password: false
