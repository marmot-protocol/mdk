language = "C"
pragma_once = true
include_version = true
cpp_compat = true
documentation = true
documentation_style = "doxy"
header = """/*
 * marmot.h — C ABI for the Marmot app runtime.
 *
 * Generated by cbindgen from crates/marmot-c; do not edit by hand.
 * Regenerate with `just c-header`.
 *
 * Ownership rules:
 *  - Fallible functions return MarmotStatus; MARMOT_STATUS_OK is 0.
 *    Detail text for the calling thread's most recent failure comes from
 *    marmot_last_error_message() (free with marmot_string_free).
 *  - Structs returned by pointer are freed ONLY with their matching
 *    marmot_*_free function, which deep-frees every field. Never free
 *    fields individually and never free a struct twice.
 *  - Input structs and strings are borrowed: the library never frees or
 *    retains caller memory.
 *  - Callbacks run on runtime worker threads; item pointers passed to a
 *    callback are borrowed and valid only for the duration of the call.
 */"""

[export]
prefix = ""

[enum]
rename_variants = "ScreamingSnakeCase"
prefix_with_name = true

[parse]
parse_deps = false
